name: "Update Changelog"

on:
  release:
    types: [released]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ github.event.release.name || inputs.version }}
          release-notes: ${{ github.event.release.body || inputs.body || 'Manual changelog update' }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: CHANGELOG.md
          commit-message: Update CHANGELOG
          branch: update-changelog
          title: "Update CHANGELOG for ${{ github.event.release.name || inputs.version }}"
          body: "Automated update of CHANGELOG.md for release ${{ github.event.release.name || inputs.version }}."
          base: main
